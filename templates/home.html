<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Filas Diárias</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
</head>
<body class="bg-light">

    <!-- Modal de Conflito de Dados (Aparece apenas quando acionado pelo Python) -->
    {% if aviso_conflito %}
    <div class="modal-overlay">
        <div class="modal-content">
            <h3>⚠️ Dados Detectados!</h3>
            <!-- Exibe a data em formato DD/MM/AAAA -->
            <p>Já existem informações salvas para o dia <strong>{{ data_conflito }}</strong>.</p>
            <p>Se você carregar o arquivo Excel novamente, <strong>todas as marcações de chegada e observações feitas hoje serão apagadas.</strong></p>
            <p>O que deseja fazer?</p>
            
            <form action="/processar_data" method="POST" class="modal-buttons">
                <!-- IMPORTANTE: O valor enviado de volta deve ser o data_iso (aaaa-mm-dd) -->
                <input type="hidden" name="data" value="{{ data_iso }}">
                <input type="hidden" name="perfil" value="{{ perfil }}">
                
                <!-- Opção 1: Mantém o que está no Banco de Dados -->
                <button type="submit" name="confirmacao_sobrescrever" value="manter" class="btn-modal btn-confirm-keep">
                    MANTER ATUAL<br><small>(Usar dados do Banco)</small>
                </button>
                
                <!-- Opção 2: Apaga o Banco e lê o Excel novamente -->
                <button type="submit" name="confirmacao_sobrescrever" value="sobrescrever" class="btn-modal btn-confirm-overwrite">
                    SUBSTITUIR<br><small>(Lê o Excel do zero)</small>
                </button>
            </form>
        </div>
    </div>
    {% endif %}

    <div class="container mt-5">
        <div class="card shadow p-4" style="max-width: 500px; margin: auto;">
            <h3 class="mb-4 text-center">Acesso à Fila Diária</h3>
            
            <form action="/processar_data" method="POST">
                <div class="mb-3">
                    <label for="data" class="form-label">Selecione a Data:</label>
                    <input type="date" id="data" name="data" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Seu Perfil:</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="perfil" id="montador" value="montador">
                        <label class="form-check-label" for="montador">Montador de Fila</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="perfil" id="demais" value="demais" checked>
                        <label class="form-check-label" for="demais">Demais Usuários</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Carregar Fila</button>
            </form>
        </div>
    </div>
</body>
</html>
